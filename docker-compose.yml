version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: vip-gamer-mongo
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: password
    volumes:
      - mongodb_data:/data/db
    networks:
      - vip-gamer-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vip-gamer-backend
    ports:
      - "5000:5000"
    environment:
      MONGODB_URI: mongodb://root:password@mongodb:27017/vip-gamer
      NODE_ENV: development
      JWT_SECRET: ${JWT_SECRET:-your_secret_key}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN}
    depends_on:
      - mongodb
    volumes:
      - ./backend/src:/app/src
    networks:
      - vip-gamer-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: vip-gamer-frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:5000/api
    depends_on:
      - backend
    networks:
      - vip-gamer-network

volumes:
  mongodb_data:

networks:
  vip-gamer-network:
    driver: bridge
